name: Build and Push Oracle Docker Image

on:
  workflow_dispatch:
    inputs:
      oracle_version:
        description: "Oracle npm version to install (e.g. 0.14.0 or latest)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: auron-labs/oracle-docker

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine oracle version
        id: version
        run: |
          VERSION="${{ github.event.inputs.oracle_version }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "latest" ]; then
            VERSION=$(npm view @steipete/oracle version 2>/dev/null || echo "latest")
          fi
          echo "oracle_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building with oracle version: ${VERSION}"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.oracle_version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ORACLE_VERSION=${{ steps.version.outputs.oracle_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
